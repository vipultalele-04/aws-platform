---
# ── common role: applied to ALL EC2 instances ─────────────────────

- name: Update all packages
  yum:
    name: "*"
    state: latest
    update_cache: true

- name: Install base packages
  yum:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - jq
      - python3
      - amazon-cloudwatch-agent
    state: present

- name: Disable root SSH login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: Restart sshd

- name: Disable SSH password auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
  notify: Restart sshd

- name: Create CloudWatch agent config dir
  file:
    path: /opt/aws/amazon-cloudwatch-agent/etc
    state: directory
    mode: '0755'

- name: Write CloudWatch agent config
  copy:
    dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    content: |
      {
        "agent": { "metrics_collection_interval": 60 },
        "logs": {
          "logs_collected": {
            "files": {
              "collect_list": [
                {
                  "file_path": "/var/log/messages",
                  "log_group_name": "{{ cloudwatch_log_prefix }}/{{ inventory_hostname }}/messages",
                  "log_stream_name": "{instance_id}"
                },
                {
                  "file_path": "/var/log/nginx/error.log",
                  "log_group_name": "{{ cloudwatch_log_prefix }}/{{ inventory_hostname }}/nginx-error",
                  "log_stream_name": "{instance_id}"
                },
                {
                  "file_path": "/var/log/app/app.log",
                  "log_group_name": "{{ cloudwatch_log_prefix }}/{{ inventory_hostname }}/app",
                  "log_stream_name": "{instance_id}"
                }
              ]
            }
          }
        },
        "metrics": {
          "append_dimensions": {
            "InstanceId": "${aws:InstanceId}"
          },
          "metrics_collected": {
            "cpu":  { "measurement": ["cpu_usage_idle","cpu_usage_user"], "metrics_collection_interval": 60 },
            "disk": { "measurement": ["used_percent"], "resources": ["/"], "metrics_collection_interval": 60 },
            "mem":  { "measurement": ["mem_used_percent"], "metrics_collection_interval": 60 }
          }
        }
      }
  notify: Restart cloudwatch agent

- name: Enable and start CloudWatch agent
  service:
    name: amazon-cloudwatch-agent
    state: started
    enabled: true
