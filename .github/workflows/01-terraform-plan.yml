# ══════════════════════════════════════════════════════════════════
# WORKFLOW 1 — Terraform Plan (runs on every PR to main)
#
# Triggered by: Pull Request opened / updated
# Posts full plan output as a PR comment
# ══════════════════════════════════════════════════════════════════
name: "1 · Terraform Plan"

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/**"

env:
  TF_VERSION:  "1.7.0"
  AWS_REGION:  "us-east-1"
  TF_DIR:      "./terraform"

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Format check
        id: fmt
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -no-color -input=false \
            -var="key_name=${{ secrets.TF_VAR_KEY_NAME }}" \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n... (truncated)'
              : plan;
            const body = `## Terraform Plan

            | | Check | Status |
            |---|---|---|
            | Format | \`terraform fmt\` | ${{ steps.fmt.outcome == 'success' && '✅ passed' || '⚠️ needs formatting' }} |
            | Init | \`terraform init\` | ${{ steps.init.outcome == 'success' && '✅ passed' || '❌ failed' }} |
            | Validate | \`terraform validate\` | ${{ steps.validate.outcome == 'success' && '✅ passed' || '❌ failed' }} |
            | Plan | \`terraform plan\` | ${{ steps.plan.outputs.exitcode == '0' && '✅ success' || '❌ failed' }} |

            <details><summary>Full plan output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1
