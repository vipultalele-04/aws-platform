# ══════════════════════════════════════════════════════════════════
# WORKFLOW 2 — Full Deploy (merge to main)
#
# Triggered by: push to main (PR merged)
#
# JOB 1 — terraform-apply   → provisions AWS infrastructure
# JOB 2 — ansible-configure → configures EC2 instances
# JOB 3 — smoke-test        → verifies deployment works
# JOB 4 — notify            → Slack summary
# ══════════════════════════════════════════════════════════════════
name: "2 · Deploy (Terraform + Ansible)"

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/02-deploy.yml"

  workflow_dispatch:
    inputs:
      skip_ansible:
        description: "Skip Ansible? (terraform only)"
        required: false
        default: "false"
        type: boolean

env:
  TF_VERSION:  "1.7.0"
  AWS_REGION:  "us-east-1"
  TF_DIR:      "./terraform"
  ANSIBLE_DIR: "./ansible"

# ══════════════════════════════════════════════════════════════════
jobs:

  # ── JOB 1: Terraform Apply ─────────────────────────────────────
  terraform-apply:
    name: "Job 1 · Terraform apply"
    runs-on: ubuntu-latest
    outputs:
      public_ips:       ${{ steps.outputs.outputs.public_ips }}
      private_ips:      ${{ steps.outputs.outputs.private_ips }}
      rds_endpoint:     ${{ steps.outputs.outputs.rds_endpoint }}
      internal_alb_dns: ${{ steps.outputs.outputs.internal_alb_dns }}
      external_alb_dns: ${{ steps.outputs.outputs.external_alb_dns }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve -input=false \
            -var="key_name=${{ secrets.TF_VAR_KEY_NAME }}" \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}"

      - name: Capture Terraform outputs
        id: outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          PUBLIC=$(terraform output -json public_ec2_public_ips \
                    | jq -r '.[]' | paste -sd ',')
          PRIVATE=$(terraform output -json private_ec2_private_ips \
                    | jq -r '.[]' | paste -sd ',')
          RDS=$(terraform output -raw rds_primary_endpoint)
          INT_ALB=$(terraform output -raw internal_alb_dns)
          EXT_ALB=$(terraform output -raw external_alb_dns)

          echo "public_ips=${PUBLIC}"         >> $GITHUB_OUTPUT
          echo "private_ips=${PRIVATE}"       >> $GITHUB_OUTPUT
          echo "rds_endpoint=${RDS}"          >> $GITHUB_OUTPUT
          echo "internal_alb_dns=${INT_ALB}"  >> $GITHUB_OUTPUT
          echo "external_alb_dns=${EXT_ALB}"  >> $GITHUB_OUTPUT

          # Job summary
          echo "### Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |"         >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                     >> $GITHUB_STEP_SUMMARY
          echo "| External ALB | \`${EXT_ALB}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Internal ALB | \`${INT_ALB}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Public EC2s  | \`${PUBLIC}\` |"  >> $GITHUB_STEP_SUMMARY
          echo "| Private EC2s | \`${PRIVATE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| RDS endpoint | \`${RDS}\` |"     >> $GITHUB_STEP_SUMMARY

  # ── JOB 2: Ansible Configure ───────────────────────────────────
  ansible-configure:
    name: "Job 2 · Ansible configure EC2s"
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: ${{ github.event.inputs.skip_ansible != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible + dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible python3-boto3
          ansible --version

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          cat >> ~/.ssh/config << EOF
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/ec2_key.pem
          EOF

      - name: Build Ansible inventory from Terraform outputs
        run: |
          PUBLIC="${{ needs.terraform-apply.outputs.public_ips }}"
          PRIVATE="${{ needs.terraform-apply.outputs.private_ips }}"
          RDS="${{ needs.terraform-apply.outputs.rds_endpoint }}"
          INT_ALB="${{ needs.terraform-apply.outputs.internal_alb_dns }}"
          JUMP_IP=$(echo $PUBLIC | cut -d',' -f1)

          # Convert comma-separated IPs to individual lines
          PUB1=$(echo $PUBLIC | cut -d',' -f1)
          PUB2=$(echo $PUBLIC | cut -d',' -f2)
          PRIV1=$(echo $PRIVATE | cut -d',' -f1)
          PRIV2=$(echo $PRIVATE | cut -d',' -f2)

          cat > ansible/inventory/hosts.ini << EOF
          [public_ec2]
          ${PUB1} ansible_user=ec2-user
          ${PUB2} ansible_user=ec2-user

          [public_ec2:vars]
          internal_alb_dns=${INT_ALB}

          [private_ec2]
          ${PRIV1} ansible_user=ec2-user ansible_ssh_common_args='-o ProxyJump=ec2-user@${JUMP_IP} -i ~/.ssh/ec2_key.pem'
          ${PRIV2} ansible_user=ec2-user ansible_ssh_common_args='-o ProxyJump=ec2-user@${JUMP_IP} -i ~/.ssh/ec2_key.pem'

          [private_ec2:vars]
          rds_endpoint=${RDS}

          [all:vars]
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_private_key_file=~/.ssh/ec2_key.pem
          EOF

          echo "Inventory built:"
          cat ansible/inventory/hosts.ini

      - name: Wait for public EC2 SSH to be ready
        run: |
          for IP in $(echo "${{ needs.terraform-apply.outputs.public_ips }}" | tr ',' ' '); do
            echo "Waiting for SSH on ${IP}..."
            timeout 300 bash -c \
              "until ssh -o StrictHostKeyChecking=no \
                         -i ~/.ssh/ec2_key.pem \
                         ec2-user@${IP} 'echo SSH ready'; do
                sleep 15
              done"
            echo "SSH ready on ${IP}"
          done

      - name: Run Ansible playbook
        working-directory: ${{ env.ANSIBLE_DIR }}
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK:   "yaml"
        run: |
          ansible-playbook \
            -i inventory/hosts.ini \
            playbook.yml \
            --private-key ~/.ssh/ec2_key.pem \
            -v

      - name: Ansible summary
        run: |
          echo "### Ansible Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Public EC2s: nginx reverse proxy configured" >> $GITHUB_STEP_SUMMARY
          echo "- Private EC2s: app server configured on :8080" >> $GITHUB_STEP_SUMMARY
          echo "- CloudWatch agent installed on all instances"  >> $GITHUB_STEP_SUMMARY

  # ── JOB 3: Smoke Test ──────────────────────────────────────────
  smoke-test:
    name: "Job 3 · Smoke test"
    runs-on: ubuntu-latest
    needs: [terraform-apply, ansible-configure]

    steps:
      - name: Wait for ALB to be healthy (90s)
        run: sleep 90

      - name: Test External ALB responds
        run: |
          ALB="${{ needs.terraform-apply.outputs.external_alb_dns }}"
          echo "Testing http://${ALB}/health ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                    --max-time 15 "http://${ALB}/health" || echo "000")
          echo "HTTP status: ${STATUS}"
          if [ "${STATUS}" = "200" ]; then
            echo "Smoke test PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "Smoke test WARNING: got ${STATUS} (ALB may still be warming up)"
            echo "Smoke test status: ${STATUS}" >> $GITHUB_STEP_SUMMARY
          fi
  notify:
    name: "Job 4 · Notify"
    runs-on: ubuntu-latest
    needs: [terraform-apply, ansible-configure, smoke-test]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform | ${{ needs.terraform-apply.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ansible   | ${{ needs.ansible-configure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke test| ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ALB DNS   | ${{ needs.terraform-apply.outputs.external_alb_dns }} |" >> $GITHUB_STEP_SUMMARY

      - name: Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ needs.smoke-test.result == 'success' && '✅' || '⚠️' }} Deploy ${{ needs.smoke-test.result }} — ${{ github.repository }}",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "Deploy Results\n• Terraform: ${{ needs.terraform-apply.result }}\n• Ansible: ${{ needs.ansible-configure.result }}\n• Smoke test: ${{ needs.smoke-test.result }}\n• External ALB: ${{ needs.terraform-apply.outputs.external_alb_dns }}\n• By: ${{ github.actor }} on ${{ github.ref_name }}"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true
